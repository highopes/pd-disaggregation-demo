! Sanitized read-only baseline collected 2026-07-23.
! Device: RoCE_LF2, N9K-C9332D-GX2B, NX-OS 10.4(3)
!
class-map type qos match-any ROCEv2
  match dscp 26
class-map type qos match-any CNP
  match dscp 48
policy-map type qos QOS_CLASSIFICATION
  class ROCEv2
    set qos-group 3
  class CNP
    set qos-group 7
  class class-default
    set qos-group 0
policy-map type network-qos qos_network
  class type network-qos c-8q-nq3
    mtu 2240
    pause pfc-cos 3
  class type network-qos c-8q-nq-default
    mtu 9216
system qos
  service-policy type network-qos qos_network
!
vlan 2300
  vn-segment 30000
interface Vlan2300
  no shutdown
  mtu 9216
  vrf member blue
  ip address 101.1.1.254/24 tag 12345
  fabric forwarding mode anycast-gateway
!
interface Ethernet1/1/1
  ttag
  ttag-strip
  switchport
  switchport access vlan 2300
  priority-flow-control mode on
  priority-flow-control watch-dog-interval on
  spanning-tree port type edge
  spanning-tree bpduguard enable
  mtu 9216
  service-policy type qos input QOS_CLASSIFICATION
  no shutdown
!
interface Ethernet1/1/2
