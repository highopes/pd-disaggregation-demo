! Minimal Phase 1 dedicated L2 backend fabric.
configure terminal
  vlan 2310
    name DYNAMO_ROCE_BACKEND
  policy-map type network-qos qos_network
    class type network-qos c-8q-nq3
      mtu 9216
  interface Ethernet1/1/1
    description DYNAMO_ROCE_CSCO-K8S-01
    switchport access vlan 2310
  interface Ethernet1/1/2
    description DYNAMO_ROCE_CSCO-K8S-02
    switchport access vlan 2310
  interface Ethernet1/2/1
    description DYNAMO_ROCE_CSCO-K8S-03
    switchport access vlan 2310
  interface Ethernet1/2/2
    description DYNAMO_ROCE_CSCO-K8S-04
    switchport access vlan 2310
end
copy running-config startup-config
