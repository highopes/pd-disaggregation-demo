apiVersion: v1
kind: Service
metadata:
  name: qwen-openai
  namespace: ai-serving
  labels:
    app: qwen-openai
spec:
  type: NodePort
  externalTrafficPolicy: Local
  selector:
    app: dynamo-qwen-frontend
    model: qwen3-14b-fp8
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
      protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: dynamo-qwen-frontend-api
  namespace: ai-serving
spec:
  endpointSelector:
    matchLabels:
      app: dynamo-qwen-frontend
      model: qwen3-14b-fp8
  ingress:
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
          rules:
            http:
              - path: /v1/.*
              - path: /metrics
              - path: /health
              - path: /live
    # Host-network Prefill/Decode workers establish Dynamo response/control
    # streams back to an OS-assigned port on the Cilium-attached Frontend.
    # Keep this unrestricted-port allowance limited to Kubernetes node
    # identities; external clients remain restricted to port 8000 below.
    - fromEntities:
        - host
        - remote-node
    # The internet reverse proxy is the only external source that requires
    # the Authorization value held by the existing Kubernetes Secret.
    - fromCIDR:
        - 192.168.200.8/32
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
          rules:
            http:
              - path: /v1/.*
                headerMatches:
                  - name: Authorization
                    secret:
                      name: vllm-api-token
                      namespace: ai-serving
    # Direct data-center clients, including 192.168.160.183, do not traverse
    # the internet reverse proxy and therefore do not require a token.
    - fromCIDRSet:
        - cidr: 0.0.0.0/0
          except:
            - 192.168.200.8/32
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
          rules:
            http:
              - path: /v1/.*
  egress:
    - toEntities:
        - all
