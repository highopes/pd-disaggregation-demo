apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen-vllm
  namespace: ai-serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
      model: qwen3-14b-fp8
  template:
    metadata:
      labels:
        app: vllm
        model: qwen3-14b-fp8
    spec:
      containers:
      - name: vllm
        image: vllm/vllm-openai:v0.9.0.1
        args:
          - "--model=Qwen/Qwen3-14B-FP8"
          - "--served-model-name=Qwen/Qwen3-14B-FP8"
          - "--dtype=auto"
          - "--gpu-memory-utilization=0.95"
          - "--max-model-len=24576"
          - "--trust-remote-code"
          - "--enable-auto-tool-choice"
          - "--tool-call-parser=hermes"
        env:
          - name: HF_HOME
            value: /root/.cache/huggingface
        ports:
          - containerPort: 8000
        resources:
          limits:
            nvidia.com/gpu: 1
        volumeMounts:
          - name: hf-cache
            mountPath: /root/.cache/huggingface
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: qwen-openai
  namespace: ai-serving
spec:
  type: NodePort
  selector:
    app: vllm
    model: qwen3-14b-fp8
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080

