apiVersion: apps/v1
kind: Deployment
metadata:
  name: foundation-vllm
  namespace: ai-serving
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: vllm
      model: foundation-sec-8b
  template:
    metadata:
      labels:
        app: vllm
        model: foundation-sec-8b
    spec:
      containers:
      - name: vllm
        image: vllm/vllm-openai:v0.9.0.1
        args:
          - --model=fdtn-ai/Foundation-Sec-8B
          - --dtype=bfloat16
          - --gpu-memory-utilization=0.9
          - --trust-remote-code
          - --max-model-len=4096
        env:  
          - name: HF_HOME
            value: /root/.cache/huggingface
        ports:
          - containerPort: 8000
        resources:
          limits:
            nvidia.com/gpu: 1
        volumeMounts:
          - name: hf-cache
            mountPath: /root/.cache/huggingface
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: foundation-openai
  namespace: ai-serving
spec:
  type: NodePort
  selector:
    app: vllm
    model: foundation-sec-8b
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30081

